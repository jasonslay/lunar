name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install trunk
        run: cargo install trunk --locked --version 0.20.3

      - name: Build web bundle
        run: env -u NO_COLOR trunk build --release

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Optional: set JTSTAY_COM_DISPATCH_TOKEN (PAT with repo scope on jasonslay/jtslay.com)
      # so lunar pushes also redeploy https://jtslay.com/lunar/
      - name: Trigger jtslay.com redeploy
        env:
          DISPATCH_TOKEN: ${{ secrets.JTSTAY_COM_DISPATCH_TOKEN }}
        run: |
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "JTSTAY_COM_DISPATCH_TOKEN not set; skipping jtslay.com redeploy"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jasonslay/jtslay.com/dispatches \
            -d "{\"event_type\":\"lunar-updated\",\"client_payload\":{\"sha\":\"${GITHUB_SHA}\"}}"
