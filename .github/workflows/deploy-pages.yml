name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  TRUNK_VERSION: "0.21.14"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: web-wasm
          cache-all-crates: "true"
          cache-on-failure: true

      - name: Cache trunk tools
        uses: actions/cache@v4
        with:
          path: ~/.cache/trunk
          key: trunk-tools-${{ runner.os }}-${{ env.TRUNK_VERSION }}

      - name: Install trunk
        run: |
          curl -fsSL -o /tmp/trunk.tar.gz \
            "https://github.com/trunk-rs/trunk/releases/download/v${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz"
          tar xzf /tmp/trunk.tar.gz -C /tmp
          install -m 755 /tmp/trunk "$CARGO_HOME/bin/trunk"
          trunk --version

      - name: Build web bundle
        run: env -u NO_COLOR trunk build --release

      - name: Package web release
        run: tar -C dist -czf lunar-web.tar.gz .

      # Rolling tag `web` — jtslay.com downloads this instead of compiling WASM.
      - name: Publish web release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes="Web build from \`${GITHUB_SHA}\`.

          Asset \`lunar-web.tar.gz\` is consumed by [jtslay.com](https://jtslay.com/lunar/)."
          if gh release view web >/dev/null 2>&1; then
            gh release upload web lunar-web.tar.gz --clobber
            gh release edit web --target "${GITHUB_SHA}" --notes "${notes}"
          else
            gh release create web lunar-web.tar.gz \
              --title "Web build" \
              --notes "${notes}" \
              --target "${GITHUB_SHA}" \
              --latest=false
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Optional: set JTSTAY_COM_DISPATCH_TOKEN (PAT with repo scope on jasonslay/jtslay.com)
      # so lunar pushes also redeploy https://jtslay.com/lunar/
      - name: Trigger jtslay.com redeploy
        env:
          DISPATCH_TOKEN: ${{ secrets.JTSTAY_COM_DISPATCH_TOKEN }}
        run: |
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "JTSTAY_COM_DISPATCH_TOKEN not set; skipping jtslay.com redeploy"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jasonslay/jtslay.com/dispatches \
            -d "{\"event_type\":\"lunar-updated\",\"client_payload\":{\"sha\":\"${GITHUB_SHA}\"}}"
