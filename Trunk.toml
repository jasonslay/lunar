[build]
public_url = "/lunar/"
dist = "dist"
filehash = true
features = "web"
no_default_features = true
# Use size-oriented Cargo profile; keep `trunk --release` so wasm-opt still runs.
cargo_profile = "wasm-release"
no_sri = true

[[hooks]]
stage = "post_build"
command = "bash"
command_arguments = ["scripts/patch-web-build.sh"]

[serve]
no_spa = true
addresses = ["0.0.0.0"]
port = 8080
